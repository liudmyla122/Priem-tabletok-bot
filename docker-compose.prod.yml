version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medbot_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-medbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medbot_password}
      POSTGRES_DB: ${DB_NAME:-medbot}
    ports:
      - '127.0.0.1:5432:5432'  # Bind only to localhost for security
    volumes:
      - medbot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medbot_redis
    restart: always
    ports:
      - '127.0.0.1:6379:6379'  # Bind only to localhost for security
    volumes:
      - medbot_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  medbot_pg_data:
  medbot_redis_data:
