services:
  - type: redis
    name: medbot-redis
    ipAllowList: [] # Only allow internal connections
    plan: free

  - type: web
    name: medbot-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: medbot-redis
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TELEGRAM_LIQPAY_PROVIDER_TOKEN
        sync: false
      - key: BILLING_ENABLED
        value: 'false'
      - key: PORT
        value: '10000'
      - key: TRIAL_DAYS
        value: '3'
      - key: SUBSCRIPTION_PRICE_EUR
        value: '3'
      - key: SUBSCRIPTION_CURRENCY
        value: 'EUR'
      - key: TTS_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TTS_VOICE
        sync: false

  - type: worker
    name: medbot-worker
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: node dist/scheduler/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: medbot-redis
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TELEGRAM_LIQPAY_PROVIDER_TOKEN
        sync: false
      - key: BILLING_ENABLED
        value: 'false'
      - key: TRIAL_DAYS
        value: '3'
      - key: SUBSCRIPTION_PRICE_EUR
        value: '3'
      - key: SUBSCRIPTION_CURRENCY
        value: 'EUR'
      - key: TTS_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TTS_VOICE
        sync: false

databases:
  - name: medbot-db
    databaseName: medbot
    user: medbot
    plan: free
