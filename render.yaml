services:
  - type: redis
    name: medbot-redis
    ipAllowList: []
    plan: free

  - type: web
    name: medbot-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build && chmod +x start.sh
    startCommand: ./start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: medbot-redis
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: BILLING_ENABLED
        value: 'false'
      - key: PORT
        value: '10000'
      - key: TRIAL_DAYS
        value: '3'
      - key: SUBSCRIPTION_PRICE_EUR
        value: '3'
      - key: SUBSCRIPTION_CURRENCY
        value: 'EUR'

databases:
  - name: medbot-db
    databaseName: medbot
    user: medbot
    plan: free
